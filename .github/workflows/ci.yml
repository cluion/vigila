# Vigila CI workflow
#
# 觸發條件 push 到 main 與所有 PR
# 執行內容 前端型別檢查與編譯 Go vet race 測試 品質與安全掃描
#   staticcheck   品質 靜態分析 抓 vet 抓不到的 bug pattern
#   govulncheck   CVE 掃描 比對 Go 依賴的已知漏洞資料庫
#   gosec         弱點 安全靜態分析 排除 G204 G304 兩者為掃描器編排器的本質用途
#                 G204 以變數啟動子程序 即執行各引擎 binary G304 讀使用者指定的設定檔路徑
# 前端需先 build 產出 web/dist 否則 go:embed 編譯失敗

name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Frontend typecheck and build
        run: |
          cd web
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: gofmt check
        run: |
          out=$(gofmt -s -l .)
          if [ -n "$out" ]; then
            echo "以下檔案未通過 gofmt -s:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...

      - name: staticcheck 品質靜態分析
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: govulncheck CVE 掃描
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: gosec 安全弱點掃描
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -quiet -exclude=G204,G304 ./...

  # 整合測試 涵蓋單元測試碰不到的 subprocess/e2e 路徑（adapter Run、cli RunE、core 掃描執行）
  # 以 build tag integration 隔離 需真實引擎 binary 這裡用 vigila 自身的 managed install 取得
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Frontend build（go:embed 需要 web/dist）
        run: |
          cd web
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build vigila binary
        run: go build -o bin/vigila ./cmd/vigila

      - name: 以 vigila 自身安裝引擎（同時 e2e 驗證 installer）
        run: |
          ./bin/vigila engine install gitleaks

      - name: 執行整合測試
        run: go test -tags integration -v ./internal/integration/...
