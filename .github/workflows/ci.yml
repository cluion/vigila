# Vigila CI workflow
#
# 觸發條件 push 到 main 與所有 PR
# 執行內容 前端型別檢查與編譯 Go vet 與 race 測試
# 前端需先 build 產出 web/dist 否則 go:embed 編譯失敗

name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Frontend typecheck and build
        run: |
          cd web
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: gofmt check
        run: |
          out=$(gofmt -s -l .)
          if [ -n "$out" ]; then
            echo "以下檔案未通過 gofmt -s:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...
