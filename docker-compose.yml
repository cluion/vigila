# Vigila 引擎容器編排
#
# 重要 這份 compose 只管掃描引擎容器 不管 Vigila 本體
# Vigila 本體是 Go binary 直接執行 見 README
#
# 用法 勾選啟用引擎
#   1. 勾選要用 docker 執行的引擎 寫入 .env 的 COMPOSE_PROFILES
#      echo "COMPOSE_PROFILES=semgrep,trivy" > .env
#   2. vigila scan ./myapp --engine semgrep
#      本機沒裝 semgrep 但 profile 已勾選時 vigila 自動改用容器執行
#
# 掛載方式 動態掛載 掃描時 vigila 以同路徑 -v 掛載目標目錄 不需先搬進 workspace
#   docker compose --profile semgrep run --rm -v /abs/myapp:/abs/myapp semgrep scan --json /abs/myapp
#
# 引擎來源優先序 managed > 本機 PATH > docker 本機有裝就用本機 docker 為備援

services:
  semgrep:
    image: semgrep/semgrep:latest
    profiles: [semgrep]

  trivy:
    image: aquasec/trivy:latest
    profiles: [trivy]
    volumes:
      - trivy-cache:/root/.cache/trivy

  grype:
    image: anchore/grype:latest
    profiles: [grype]
    volumes:
      - grype-db:/.cache/grype

  trufflehog:
    image: trufflesecurity/trufflehog:latest
    profiles: [trufflehog]

  osv-scanner:
    image: ghcr.io/google/osv-scanner:latest
    profiles: [osv-scanner]

  checkov:
    image: bridgecrew/checkov:latest
    profiles: [checkov]

  # ZAP 為 URL 目標 報告寫在容器內 /zap/wrk/ vigila 掃描時動態掛載暫存輸出目錄並讀回報告
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    profiles: [zap]

  # nuclei 為 URL 目標 直接傳入 -u 不需掛載 stdout 即 NDJSON
  nuclei:
    image: projectdiscovery/nuclei:latest
    profiles: [nuclei]

  # gitleaks 報告只能寫檔 vigila 掃描時掛目標與暫存輸出目錄 執行後讀回報告
  gitleaks:
    image: ghcr.io/gitleaks/gitleaks:latest
    profiles: [gitleaks]

  # nmap 為 host 目標 容器需 host 網路才能掃到內網主機
  # 注意 network_mode: host 僅 Linux Docker 與 OrbStack 真正生效
  # Docker Desktop (macOS/Windows) 不支援 請改用 managed 或 system 安裝
  nmap:
    image: instrumentisto/nmap:latest
    profiles: [nmap]
    network_mode: host

volumes:
  trivy-cache:
  grype-db:
